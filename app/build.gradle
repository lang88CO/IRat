plugins {
    id 'com.android.application'
}

android {
    namespace 'com.imagerat.client'
    compileSdk 33

    defaultConfig {
        applicationId "com.imagerat.client"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

